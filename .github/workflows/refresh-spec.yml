name: Refresh C2PA spec

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      url:
        description: "Schemas bundle URL (leave empty to use the latest default)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Refresh spec
        id: refresh
        env:
          SPEC_URL: ${{ inputs.url }}
        run: |
          set -euo pipefail
          if [ -n "$SPEC_URL" ]; then
            output=$(cargo run -p c2pa-spec-codegen -- --download --url "$SPEC_URL" 2>&1)
          else
            output=$(cargo run -p c2pa-spec-codegen -- --download 2>&1)
          fi
          # Re-emit for the job log so the output is still visible.
          printf '%s\n' "$output"
          old=$(printf '%s\n' "$output" | grep -oE 'old_spec_version=[^[:space:]]+' | tail -1 | cut -d= -f2 || true)
          new=$(printf '%s\n' "$output" | grep -oE 'new_spec_version=[^[:space:]]+' | tail -1 | cut -d= -f2 || true)
          echo "old=${old:-unknown}" >> "$GITHUB_OUTPUT"
          echo "new=${new:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Compose PR title
        id: title
        env:
          OLD: ${{ steps.refresh.outputs.old }}
          NEW: ${{ steps.refresh.outputs.new }}
        run: |
          if [ "$OLD" = "$NEW" ]; then
            title="update: refresh C2PA spec (still on $NEW)"
          else
            title="update: C2PA spec $OLD → $NEW"
          fi
          echo "value=$title" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "No schema changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Files changed:"
            git diff --name-only
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cddl parser
        run: cargo install cddl --locked

      - name: Detect obsolete patches
        id: patches
        run: |
          set -euo pipefail
          obsolete=()
          patches_dir=c2pa-spec/schema-patches
          cddl_dir=c2pa-spec/schemas/cddl
          if [ -d "$patches_dir" ]; then
            for patch in "$patches_dir"/*.cddl; do
              [ -e "$patch" ] || continue
              name=$(basename "$patch")
              upstream="$cddl_dir/$name"
              [ -f "$upstream" ] || continue
              if cddl compile-cddl --cddl "$upstream" >/dev/null 2>&1; then
                obsolete+=("$name")
              fi
            done
          fi
          if [ ${#obsolete[@]} -gt 0 ]; then
            printf 'Obsolete patches (upstream now parses cleanly):\n'
            printf '  - %s\n' "${obsolete[@]}"
            {
              echo "list<<EOF"
              printf '%s\n' "${obsolete[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No obsolete patches detected."
            echo "list=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build and tests
        if: steps.diff.outputs.changed == 'true'
        id: verify
        continue-on-error: true
        run: cargo test --workspace

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ steps.title.outputs.value }}
          title: ${{ steps.title.outputs.value }}
          body: |
            Nightly refresh of the committed CDDL, YAML, and ABNF schemas plus the
            regenerated Rust sources, produced by running:

            ```
            cargo run -p c2pa-spec-codegen -- --download
            ```

            Spec version on this branch before refresh: **${{ steps.refresh.outputs.old }}**
            Spec version after refresh: **${{ steps.refresh.outputs.new }}**

            `cargo test --workspace` on this branch: **${{ steps.verify.outcome }}**.

            **Obsolete patches:**
            ```
            ${{ steps.patches.outputs.list || '(none)' }}
            ```
            If any are listed, the upstream file now parses with `cddl` on its
            own. Review whether the patch content has also been merged upstream
            and delete the patch file if so (see `c2pa-spec/schema-patches/`).

            Review the diff for upstream spec changes, confirm the regenerated types
            still round-trip against real manifests, and merge if CI is green.
          branch: auto/refresh-spec
          delete-branch: true
          labels: spec-refresh

      - name: Report workflow failure
        if: failure() || steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OLD: ${{ steps.refresh.outputs.old }}
          NEW: ${{ steps.refresh.outputs.new }}
          VERIFY: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          Nightly \`refresh-spec\` run failed.

          - Run: $RUN_URL
          - Spec version before: $OLD
          - Spec version after: $NEW
          - Test step outcome: $VERIFY

          Investigate the run logs. If this is a codegen or parser
          failure caused by upstream schema changes, a new
          \`schema-patches/\` entry or a codegen fix is likely needed.
          EOF
          )
          existing=$(gh issue list --label spec-refresh-failure --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "Nightly spec refresh failures" \
              --label spec-refresh-failure \
              --body "$body"
          fi
